<nav class="navbar">
  <div class="navbar-brand">
    <img class="logo-img" src="krishna-logo.png" alt="Krishna" />
    <span class="brand-name">Bansiwala Bhojnalay</span>
  </div>
  @if (auth.isLoggedIn()) {
    <div class="navbar-links">
      @if (auth.isAdmin()) {
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
        <a routerLink="/check-in" routerLinkActive="active">Check In</a>
        <a routerLink="/students" routerLinkActive="active">Members</a>
        <a routerLink="/master-qr" routerLinkActive="active">Master QR</a>
      } @else {
        <a routerLink="/scan" routerLinkActive="active">Check In</a>
        <a routerLink="/my-report" routerLinkActive="active">My Report</a>
      }
      <span class="user-info">{{ auth.username() }}</span>
      <button class="btn btn-sm btn-outline logout-btn" (click)="logout()">Logout</button>
    </div>
  }
</nav>
