<nav class="navbar">
  <div class="navbar-brand">
    <img class="logo-img" src="krishna-logo.png" alt="Krishna" />
    <span class="brand-name">Bansiwala Bhojnalay</span>
  </div>
  @if (auth.isLoggedIn()) {
    <button class="menu-toggle" (click)="menuOpen = !menuOpen" [class.open]="menuOpen">
      <span></span><span></span><span></span>
    </button>
    <div class="navbar-links" [class.show]="menuOpen">
      @if (auth.isAdmin()) {
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="menuOpen=false">Dashboard</a>
        <a routerLink="/check-in" routerLinkActive="active" (click)="menuOpen=false">Check In</a>
        <a routerLink="/students" routerLinkActive="active" (click)="menuOpen=false">Members</a>
        <a routerLink="/master-qr" routerLinkActive="active" (click)="menuOpen=false">Master QR</a>
      } @else {
        <a routerLink="/scan" routerLinkActive="active" (click)="menuOpen=false">Check In</a>
        <a routerLink="/my-report" routerLinkActive="active" (click)="menuOpen=false">My Report</a>
      }
      <span class="user-info">{{ auth.username() }}</span>
      <button class="btn btn-sm btn-outline logout-btn" (click)="logout()">Logout</button>
    </div>
  }
</nav>
