<div class="page-header">
  <h1>{{ isEdit() ? 'Edit Member' : 'Register New Member' }}</h1>
</div>

@if (error()) {
  <div class="alert alert-error">{{ error() }}</div>
}
@if (success()) {
  <div class="alert alert-success">{{ success() }}</div>
}

<div class="card form-card">
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" [(ngModel)]="form.name" name="name" placeholder="e.g. Rahul Sharma" required />
    </div>

    <div class="form-group">
      <label>Mobile Number *</label>
      <input type="tel" [(ngModel)]="form.mobile" name="mobile" placeholder="e.g. 9876543210" required maxlength="10" />
    </div>

    <div class="form-group">
      <label>Email (optional)</label>
      <input type="email" [(ngModel)]="form.email" name="email" placeholder="e.g. rahul&#64;email.com" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-outline" (click)="router.navigate(['/students'])">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving...' : (isEdit() ? 'Update Member' : 'Register Member') }}
      </button>
    </div>
  </form>
</div>
